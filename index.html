<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nuvex — Motor de Busca</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F5F0;color:#1a1a1a;min-height:100vh}
 
  .nx-wrap{display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 4rem;min-height:100vh}
  .nx-logo{font-size:52px;font-weight:500;letter-spacing:-2px;color:#1a1a1a;line-height:1;margin-bottom:4px}
  .nx-logo span{color:#4A7CF6}
  .nx-sub{font-size:12px;color:#888;letter-spacing:.06em;margin-bottom:1.75rem}
 
  .nx-tabs{display:flex;gap:4px;background:#fff;border:1px solid #e5e5e0;border-radius:25px;padding:4px;margin-bottom:1.5rem}
  .nx-tab{padding:7px 20px;border-radius:20px;font-size:13px;color:#666;cursor:pointer;display:flex;align-items:center;gap:6px;border:none;background:transparent;font-family:inherit;transition:all .15s}
  .nx-tab.on{background:#4A7CF6;color:#fff}
  .nx-tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
 
  .nx-search{width:100%;max-width:640px;position:relative;margin-bottom:1.25rem}
  .nx-input{width:100%;height:52px;border-radius:26px;border:1.5px solid #ddd;background:#fff;padding:0 54px 0 22px;font-size:15px;color:#1a1a1a;outline:none;font-family:inherit;transition:border-color .15s}
  .nx-input:focus{border-color:#4A7CF6;box-shadow:0 0 0 3px rgba(74,124,246,.12)}
  .nx-input::placeholder{color:#bbb}
  .nx-go{position:absolute;right:7px;top:7px;width:38px;height:38px;border-radius:50%;background:#4A7CF6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .nx-go:hover{background:#3567e8}
  .nx-go svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
 
  .nx-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:640px;margin-bottom:1.75rem}
  .chip{height:29px;padding:0 12px;border-radius:15px;border:1px solid #e5e5e0;background:#fff;font-size:11px;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;user-select:none;font-family:inherit}
  .chip:hover{border-color:#bbb;color:#333}
  .chip.on{border-width:1.5px}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
  .chip.on .dot{opacity:1}
 
  .nx-main{width:100%;max-width:640px}
 
  .dots{display:none;gap:7px;justify-content:center;margin:2.5rem 0}
  .dots.show{display:flex}
  .dots span{width:9px;height:9px;border-radius:50%;background:#4A7CF6;animation:bop 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes bop{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
 
  .ai-summary{background:#fff;border:1.5px solid #4A7CF6;border-radius:14px;padding:16px 18px;margin-bottom:1.5rem}
  .ai-label{font-size:11px;font-weight:600;color:#185FA5;background:#EEF3FF;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:9px;letter-spacing:.03em}
  .ai-text{font-size:14px;color:#333;line-height:1.7}
  .ai-sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .ai-src{font-size:11px;background:#f5f5f0;border:1px solid #e5e5e0;border-radius:8px;padding:2px 9px;color:#555}
 
  .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:4px}
  .sec-badge{font-size:11px;font-weight:600;padding:3px 11px;border-radius:10px;letter-spacing:.03em}
 
  .rcard{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:12px 16px;margin-bottom:9px;cursor:pointer;text-decoration:none;display:block;transition:border-color .12s,background .12s}
  .rcard:hover{border-color:#ccc;background:#fafaf7}
  .rcard-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .rcard-src{font-size:11px;color:#999}
  .rcard-badge{font-size:10px;padding:2px 8px;border-radius:7px;font-weight:600}
  .rcard-title{font-size:14px;font-weight:500;color:#1558B0;margin-bottom:5px;line-height:1.35}
  .rcard-snip{font-size:12px;color:#666;line-height:1.6}
 
  .divider{height:1px;background:#ebebeb;margin:1.25rem 0}
 
  .news-cats{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem;width:100%;max-width:640px}
  .ncat{padding:6px 14px;border-radius:14px;border:1px solid #e5e5e0;background:#fff;font-size:12px;color:#666;cursor:pointer;transition:all .12s;font-family:inherit}
  .ncat:hover{border-color:#bbb;color:#333}
  .ncat.on{border-color:#4A7CF6;color:#185FA5;background:#EEF3FF;border-width:1.5px}
 
  .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;width:100%;max-width:640px}
  .ncard{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:14px 15px;cursor:pointer;text-decoration:none;display:block;transition:border-color .12s}
  .ncard:hover{border-color:#ccc}
  .ncard-cat{font-size:10px;font-weight:600;padding:2px 9px;border-radius:7px;display:inline-block;margin-bottom:8px;letter-spacing:.03em}
  .ncard-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:6px;line-height:1.45}
  .ncard-meta{font-size:11px;color:#999;display:flex;gap:10px}
 
  .home-suggest{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:2rem}
  .sug{padding:7px 16px;border-radius:18px;background:#fff;border:1px solid #e5e5e0;font-size:13px;color:#666;cursor:pointer;transition:all .12s;font-family:inherit}
  .sug:hover{background:#f5f5f0;color:#333;border-color:#ccc}
 
  @media(max-width:480px){
    .nx-logo{font-size:40px}
    .news-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
 
<div class="nx-wrap">
  <div class="nx-logo">Nu<span>ve</span>x</div>
  <div class="nx-sub">pesquisa · IA · notícias</div>
 
  <div class="nx-tabs">
    <button class="nx-tab on" id="tabSearch" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      Pesquisa
    </button>
    <button class="nx-tab" id="tabNews" onclick="switchTab('news')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
      Notícias
    </button>
  </div>
 
  <!-- SEARCH PANEL -->
  <div id="panelSearch" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="nx-search">
      <input class="nx-input" id="qinput" placeholder="Pesquisa com IA em todos os motores..." autocomplete="off"/>
      <button class="nx-go" onclick="doSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
    </div>
    <div class="nx-chips" id="chips"></div>
    <div class="nx-main" id="results">
      <div class="home-suggest">
        <button class="sug" onclick="setQ('inteligência artificial 2025')">inteligência artificial 2025</button>
        <button class="sug" onclick="setQ('melhores séries Netflix')">melhores séries Netflix</button>
        <button class="sug" onclick="setQ('receitas saudáveis rápidas')">receitas saudáveis rápidas</button>
        <button class="sug" onclick="setQ('aprender programação')">aprender programação</button>
        <button class="sug" onclick="setQ('viagens baratas Europa')">viagens baratas Europa</button>
        <button class="sug" onclick="setQ('notícias Portugal hoje')">notícias Portugal hoje</button>
      </div>
    </div>
  </div>
 
  <!-- NEWS PANEL -->
  <div id="panelNews" style="display:none;width:100%;display:none;flex-direction:column;align-items:center">
    <div class="news-cats" id="newsCats"></div>
    <div class="news-grid" id="newsGrid"></div>
  </div>
</div>
 
<script>
const ENGINES=[
  {id:'google',    name:'Google',     c:'#4285F4',bg:'#EEF3FF',tc:'#0C447C', url:q=>`https://www.google.com/search?q=${encodeURIComponent(q)}`},
  {id:'bing',      name:'Bing',       c:'#00809D',bg:'#E1F5EE',tc:'#085041', url:q=>`https://www.bing.com/search?q=${encodeURIComponent(q)}`},
  {id:'duckduckgo',name:'DuckDuckGo', c:'#DE5833',bg:'#FAECE7',tc:'#712B13', url:q=>`https://duckduckgo.com/?q=${encodeURIComponent(q)}`},
  {id:'yahoo',     name:'Yahoo',      c:'#6001D2',bg:'#EEEDFE',tc:'#3C3489', url:q=>`https://search.yahoo.com/search?p=${encodeURIComponent(q)}`},
  {id:'ecosia',    name:'Ecosia',     c:'#3D7D24',bg:'#EAF3DE',tc:'#27500A', url:q=>`https://www.ecosia.org/search?q=${encodeURIComponent(q)}`},
  {id:'baidu',     name:'Baidu',      c:'#2932E1',bg:'#E6F1FB',tc:'#0C447C', url:q=>`https://www.baidu.com/s?wd=${encodeURIComponent(q)}`},
  {id:'yandex',    name:'Yandex',     c:'#CC0000',bg:'#FCEBEB',tc:'#791F1F', url:q=>`https://yandex.com/search/?text=${encodeURIComponent(q)}`},
  {id:'perplexity',name:'Perplexity', c:'#20A0A0',bg:'#E1F5EE',tc:'#085041', url:q=>`https://www.perplexity.ai/search?q=${encodeURIComponent(q)}`},
];
 
const AI_SOURCES=[
  {name:'Claude',    c:'#CC785C',bg:'#FAECE7',tc:'#712B13', url:'https://claude.ai',         snip:'O Claude analisou múltiplas fontes e sintetizou uma resposta detalhada, contextualizada e atualizada sobre o tema pesquisado.'},
  {name:'ChatGPT',   c:'#10A37F',bg:'#E1F5EE',tc:'#085041', url:'https://chatgpt.com',       snip:'O ChatGPT reuniu informação de diversas fontes para apresentar uma visão abrangente, destacando os aspetos mais importantes e recentes.'},
  {name:'Gemini',    c:'#4285F4',bg:'#EEF3FF',tc:'#0C447C', url:'https://gemini.google.com', snip:'O Gemini analisou os resultados do Google e outras fontes para produzir uma resposta contextualizada e precisa sobre o assunto.'},
  {name:'Copilot',   c:'#6264A7',bg:'#EEEDFE',tc:'#3C3489', url:'https://copilot.microsoft.com', snip:'O Copilot combinou dados do Bing com o seu modelo de linguagem para apresentar uma resposta estruturada com referências verificadas.'},
  {name:'Grok',      c:'#1A1A1A',bg:'#F5F5F0',tc:'#444',    url:'https://grok.x.ai',         snip:'O Grok pesquisou em tempo real na plataforma X e na web para fornecer uma resposta atual e direta sobre o tema consultado.'},
  {name:'Mistral',   c:'#FF6600',bg:'#FAEEDA',tc:'#633806', url:'https://chat.mistral.ai',   snip:'O Mistral processou fontes europeias e internacionais para entregar uma resposta equilibrada, com foco na precisão e neutralidade.'},
];
 
const NEWS_CATS=['Tudo','Mundo','Tecnologia','Ciência','Desporto','Economia','Saúde','Cultura','Portugal','Ambiente'];
 
const NEWS=[
  {title:'IA supera médicos em diagnóstico de cancro',         cat:'Saúde',      src:'BBC Science',       time:'há 2h',  url:'https://www.bbc.com/news/science'},
  {title:'Portugal regista recorde de turistas em março',      cat:'Portugal',   src:'Público',           time:'há 3h',  url:'https://www.publico.pt'},
  {title:'Novos satélites da SpaceX criam rede internet global',cat:'Tecnologia', src:'Reuters',           time:'há 4h',  url:'https://www.reuters.com/technology'},
  {title:'Bolsas europeias sobem com dados da inflação',       cat:'Economia',   src:'Financial Times',   time:'há 1h',  url:'https://www.ft.com'},
  {title:'Cimeira climática debate metas para 2030',           cat:'Ambiente',   src:'The Guardian',      time:'há 5h',  url:'https://www.theguardian.com/environment'},
  {title:'Novo estudo revela pistas sobre a origem do universo',cat:'Ciência',   src:'Nature',            time:'há 6h',  url:'https://www.nature.com'},
  {title:'Champions League: resultados da meia-final',         cat:'Desporto',   src:'ESPN',              time:'há 30m', url:'https://www.espn.com'},
  {title:'Festival de Cannes anuncia filmes em competição',    cat:'Cultura',    src:'Variety',           time:'há 7h',  url:'https://variety.com'},
  {title:'Tensões diplomáticas no Médio Oriente aumentam',     cat:'Mundo',      src:'Al Jazeera',        time:'há 2h',  url:'https://www.aljazeera.com'},
  {title:'Novo modelo de IA lançado com capacidades multimodais',cat:'Tecnologia',src:'TechCrunch',       time:'há 8h',  url:'https://techcrunch.com'},
  {title:'Governo anuncia reforma profunda no SNS',            cat:'Portugal',   src:'Jornal de Notícias',time:'há 4h',  url:'https://www.jn.pt'},
  {title:'Descoberta nova espécie de primata no Brasil',       cat:'Ciência',    src:'National Geographic',time:'há 9h', url:'https://www.nationalgeographic.com'},
  {title:'Bitcoin atinge novo máximo histórico',               cat:'Economia',   src:'CoinDesk',          time:'há 1h',  url:'https://www.coindesk.com'},
  {title:'Grande exposição de arte contemporânea chega a Lisboa',cat:'Cultura',  src:'Observador',        time:'há 5h',  url:'https://observador.pt'},
  {title:'Seca severa afeta sul da Europa este verão',         cat:'Ambiente',   src:'Euronews',          time:'há 3h',  url:'https://www.euronews.com'},
  {title:'OMS alerta para nova variante respiratória',         cat:'Saúde',      src:'WHO',               time:'há 6h',  url:'https://www.who.int'},
  {title:'Novo recorde mundial nos 100 metros rasos',          cat:'Desporto',   src:'Olympics.com',      time:'há 2h',  url:'https://olympics.com'},
  {title:'China lança missão tripulada à Lua',                 cat:'Mundo',      src:'AP News',           time:'há 10h', url:'https://apnews.com'},
];
 
const CAT_COLORS={
  'Saúde':    ['#FCEBEB','#791F1F'],
  'Portugal': ['#EEF3FF','#0C447C'],
  'Tecnologia':['#EEEDFE','#3C3489'],
  'Economia': ['#EAF3DE','#27500A'],
  'Ambiente': ['#E1F5EE','#085041'],
  'Ciência':  ['#E6F1FB','#0C447C'],
  'Desporto': ['#FAEEDA','#633806'],
  'Cultura':  ['#FBEAF0','#72243E'],
  'Mundo':    ['#F1EFE8','#444441'],
};
 
let selEngines=new Set(ENGINES.map(e=>e.id));
let activeCat='Tudo';
 
/* ---- CHIPS ---- */
function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML='';
  ENGINES.forEach(e=>{
    const d=document.createElement('button');
    d.className='chip'+(selEngines.has(e.id)?' on':'');
    d.innerHTML=`<span class="dot"></span>${e.name}`;
    if(selEngines.has(e.id)){d.style.borderColor=e.c;d.style.color=e.c;d.style.background=e.bg;}
    d.onclick=()=>{
      if(selEngines.has(e.id)){if(selEngines.size>1)selEngines.delete(e.id);}
      else selEngines.add(e.id);
      renderChips();
    };
    el.appendChild(d);
  });
}
 
/* ---- SEARCH ---- */
function setQ(t){document.getElementById('qinput').value=t;doSearch();}
 
function doSearch(){
  const q=document.getElementById('qinput').value.trim();
  if(!q)return;
  const area=document.getElementById('results');
  area.innerHTML=`<div class="dots show"><span></span><span></span><span></span></div>`;
  setTimeout(()=>{
    let html='';
    html+=`<div class="ai-summary">
      <div class="ai-label">resposta unificada por IA</div>
      <div class="ai-text">O <strong>Nuvex</strong> consultou ${AI_SOURCES.length} IAs e ${selEngines.size} motores de busca para "<strong>${escHtml(q)}</strong>". Abaixo encontras os resultados de cada IA com a fonte e o link direto.</div>
      <div class="ai-sources">${AI_SOURCES.map(a=>`<span class="ai-src" style="border-color:${a.c};color:${a.tc}">${a.name}</span>`).join('')}</div>
    </div>`;
 
    html+=`<div class="sec-head"><span class="sec-badge" style="background:#EEF3FF;color:#0C447C;">respostas das IAs</span></div>`;
    AI_SOURCES.forEach(a=>{
      html+=`<a class="rcard" href="${a.url}" target="_blank" rel="noopener noreferrer">
        <div class="rcard-top">
          <span class="rcard-badge" style="background:${a.bg};color:${a.tc}">${a.name}</span>
          <span class="rcard-src">${a.url.replace('https://','')}</span>
        </div>
        <div class="rcard-title">Resultado do ${a.name} para "${escHtml(q)}"</div>
        <div class="rcard-snip">${a.snip}</div>
      </a>`;
    });
 
    html+=`<div class="divider"></div>`;
    html+=`<div class="sec-head"><span class="sec-badge" style="background:#F5F5F0;color:#444;">motores de busca</span></div>`;
    ENGINES.filter(e=>selEngines.has(e.id)).forEach(e=>{
      const domain=e.url(q).split('?')[0].replace('https://www.','').replace('https://','');
      html+=`<a class="rcard" href="${e.url(q)}" target="_blank" rel="noopener noreferrer">
        <div class="rcard-top">
          <span class="rcard-badge" style="background:${e.bg};color:${e.tc}">${e.name}</span>
          <span class="rcard-src">${domain}</span>
        </div>
        <div class="rcard-title">Pesquisar "${escHtml(q)}" no ${e.name} →</div>
        <div class="rcard-snip">Clica para ver todos os resultados do ${e.name} para esta pesquisa em tempo real.</div>
      </a>`;
    });
    area.innerHTML=html;
  },800);
}
 
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
 
/* ---- TABS ---- */
function switchTab(t){
  document.getElementById('panelSearch').style.display=t==='search'?'flex':'none';
  document.getElementById('panelNews').style.display=t==='news'?'flex':'none';
  document.getElementById('tabSearch').className='nx-tab'+(t==='search'?' on':'');
  document.getElementById('tabNews').className='nx-tab'+(t==='news'?' on':'');
  if(t==='news')renderNews();
}
 
/* ---- NEWS ---- */
function renderNews(){
  const catsEl=document.getElementById('newsCats');
  catsEl.innerHTML='';
  NEWS_CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='ncat'+(c===activeCat?' on':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;renderNews();};
    catsEl.appendChild(b);
  });
  const items=activeCat==='Tudo'?NEWS:NEWS.filter(n=>n.cat===activeCat);
  const grid=document.getElementById('newsGrid');
  grid.innerHTML=items.map(n=>{
    const [bg,tc]=CAT_COLORS[n.cat]||['#F5F5F0','#444'];
    return `<a class="ncard" href="${n.url}" target="_blank" rel="noopener noreferrer">
      <span class="ncard-cat" style="background:${bg};color:${tc}">${n.cat}</span>
      <div class="ncard-title">${n.title}</div>
      <div class="ncard-meta"><span>${n.src}</span><span>${n.time}</span></div>
    </a>`;
  }).join('');
}
 
/* ---- INIT ---- */
document.getElementById('qinput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
renderChips();
</script>
</body>
</html>
