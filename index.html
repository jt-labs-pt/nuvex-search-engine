<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Nuvex"/>
<meta name="theme-color" content="#4A7CF6"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/icon-512.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
<link rel="manifest" href="/manifest.json"/>
<title>Nuvex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F5F0;color:#1a1a1a;min-height:100vh}
.wrap{display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 4rem}
.logo{font-size:52px;font-weight:500;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.logo span{color:#4A7CF6}
.sub{font-size:12px;color:#888;letter-spacing:.06em;margin-bottom:1rem}
.ibtn{height:34px;padding:0 16px;border-radius:17px;background:#4A7CF6;border:none;color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:none;align-items:center;gap:6px;margin-bottom:1.25rem}
.ibtn:hover{background:#3567e8}
.ibtn.show{display:flex}
.ibtn svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.tabs{display:flex;gap:4px;background:#fff;border:1px solid #e5e5e0;border-radius:25px;padding:4px;margin-bottom:1.5rem}
.tab{padding:7px 20px;border-radius:20px;font-size:13px;color:#666;cursor:pointer;display:flex;align-items:center;gap:6px;border:none;background:transparent;font-family:inherit;transition:all .15s}
.tab.on{background:#4A7CF6;color:#fff}
.tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sbox{width:100%;max-width:640px;position:relative;margin-bottom:1.25rem}
.sinput{width:100%;height:52px;border-radius:26px;border:1.5px solid #ddd;background:#fff;padding:0 54px 0 22px;font-size:15px;color:#1a1a1a;outline:none;font-family:inherit;transition:border-color .15s}
.sinput:focus{border-color:#4A7CF6;box-shadow:0 0 0 3px rgba(74,124,246,.12)}
.sinput::placeholder{color:#bbb}
.sgo{position:absolute;right:7px;top:7px;width:38px;height:38px;border-radius:50%;background:#4A7CF6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sgo:hover{background:#3567e8}
.sgo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:640px;margin-bottom:1.75rem}
.chip{height:29px;padding:0 12px;border-radius:15px;border:1px solid #e5e5e0;background:#fff;font-size:11px;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;user-select:none;font-family:inherit}
.chip.on{border-width:1.5px}
.chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
.chip.on .dot{opacity:1}
.main{width:100%;max-width:640px}
.spin{display:none;gap:7px;justify-content:center;margin:2.5rem 0}
.spin.show{display:flex}
.spin span{width:9px;height:9px;border-radius:50%;background:#4A7CF6;animation:bop 1.2s infinite}
.spin span:nth-child(2){animation-delay:.2s}
.spin span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.aisummary{background:#fff;border:1.5px solid #4A7CF6;border-radius:14px;padding:16px 18px;margin-bottom:1.5rem}
.ailabel{font-size:11px;font-weight:600;color:#185FA5;background:#EEF3FF;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:9px}
.aitext{font-size:14px;color:#333;line-height:1.7}
.aisrcs{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.aisrc{font-size:11px;background:#f5f5f0;border:1px solid #e5e5e0;border-radius:8px;padding:2px 9px;color:#555}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:4px}
.sb{font-size:11px;font-weight:600;padding:3px 11px;border-radius:10px}
.rc{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:12px 16px;margin-bottom:9px;text-decoration:none;display:block;transition:border-color .12s,background .12s}
.rc:hover{border-color:#ccc;background:#fafaf7}
.rct{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.rcs{font-size:11px;color:#999}
.rcb{font-size:10px;padding:2px 8px;border-radius:7px;font-weight:600}
.rch{font-size:14px;font-weight:500;color:#1558B0;margin-bottom:5px;line-height:1.35}
.rcp{font-size:12px;color:#666;line-height:1.6}
.div{height:1px;background:#ebebeb;margin:1.25rem 0}
.ncats{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem;width:100%;max-width:640px}
.ncat{padding:6px 14px;border-radius:14px;border:1px solid #e5e5e0;background:#fff;font-size:12px;color:#666;cursor:pointer;transition:all .12s;font-family:inherit}
.ncat:hover{border-color:#bbb;color:#333}
.ncat.on{border-color:#4A7CF6;color:#185FA5;background:#EEF3FF;border-width:1.5px}
.ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;width:100%;max-width:640px}
.nc{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:14px 15px;text-decoration:none;display:block;transition:border-color .12s}
.nc:hover{border-color:#ccc}
.ncc{font-size:10px;font-weight:600;padding:2px 9px;border-radius:7px;display:inline-block;margin-bottom:8px}
.nct{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:6px;line-height:1.45}
.ncm{font-size:11px;color:#999;display:flex;gap:10px}
.sugs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:2rem}
.sug{padding:7px 16px;border-radius:18px;background:#fff;border:1px solid #e5e5e0;font-size:13px;color:#666;cursor:pointer;transition:all .12s;font-family:inherit}
.sug:hover{background:#f5f5f0;color:#333;border-color:#ccc}
.mbg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;justify-content:center;align-items:center}
.mbg.show{display:flex}
.mbox{background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:90%;position:relative}
.mbox h2{font-size:17px;font-weight:500;margin-bottom:8px}
.mbox p{font-size:13px;color:#666;line-height:1.6;margin-bottom:14px}
.mclose{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;font-family:inherit;line-height:1}
.mstep{background:#F5F5F0;border-radius:10px;padding:12px 14px;font-size:13px;color:#444;line-height:1.8;margin-bottom:10px}
.mtag{display:inline-block;background:#4A7CF6;color:#fff;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:600;margin:0 2px}
@media(max-width:480px){.logo{font-size:40px}.ngrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Nu<span>ve</span>x</div>
  <div class="sub">pesquisa &middot; IA &middot; not&iacute;cias</div>

  <button class="ibtn" id="installBtn" onclick="handleInstall()">
    <svg viewBox="0 0 24 24"><path d="M12 2v13m0 0l-4-4m4 4l4-4M2 17v2a2 2 0 002 2h16a2 2 0 002-2v-2"/></svg>
    Instalar app
  </button>

  <div class="tabs">
    <button class="tab on" id="tabSearch" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      Pesquisa
    </button>
    <button class="tab" id="tabNews" onclick="switchTab('news')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
      Not&iacute;cias
    </button>
  </div>

  <div id="panelSearch" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="sbox">
      <input class="sinput" id="qinput" placeholder="Pesquisa com IA em todos os motores..." autocomplete="off"/>
      <button class="sgo" onclick="doSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="main" id="results">
      <div class="sugs">
        <button class="sug" onclick="setQ('intelig\u00eancia artificial 2025')">intelig\u00eancia artificial 2025</button>
        <button class="sug" onclick="setQ('melhores s\u00e9ries Netflix')">melhores s\u00e9ries Netflix</button>
        <button class="sug" onclick="setQ('receitas saud\u00e1veis r\u00e1pidas')">receitas saud\u00e1veis r\u00e1pidas</button>
        <button class="sug" onclick="setQ('aprender programa\u00e7\u00e3o')">aprender programa\u00e7\u00e3o</button>
        <button class="sug" onclick="setQ('viagens baratas Europa')">viagens baratas Europa</button>
        <button class="sug" onclick="setQ('not\u00edcias Portugal hoje')">not\u00edcias Portugal hoje</button>
      </div>
    </div>
  </div>

  <div id="panelNews" style="display:none;width:100%;flex-direction:column;align-items:center">
    <div class="ncats" id="newsCats"></div>
    <div class="ngrid" id="newsGrid"></div>
  </div>
</div>

<div class="mbg" id="installModal" onclick="bgClick(event)">
  <div class="mbox">
    <button class="mclose" onclick="closeModal()">&#215;</button>
    <h2>Instalar o Nuvex</h2>
    <p>Adiciona o Nuvex ao teu ecr&atilde; inicial como uma app nativa.</p>
    <div id="modalContent"></div>
  </div>
</div>

<script>
var ENGINES=[
  {id:'google',    name:'Google',     c:'#4285F4',bg:'#EEF3FF',tc:'#0C447C', url:function(q){return 'https://www.google.com/search?q='+encodeURIComponent(q);}},
  {id:'bing',      name:'Bing',       c:'#00809D',bg:'#E1F5EE',tc:'#085041', url:function(q){return 'https://www.bing.com/search?q='+encodeURIComponent(q);}},
  {id:'duckduckgo',name:'DuckDuckGo', c:'#DE5833',bg:'#FAECE7',tc:'#712B13', url:function(q){return 'https://duckduckgo.com/?q='+encodeURIComponent(q);}},
  {id:'yahoo',     name:'Yahoo',      c:'#6001D2',bg:'#EEEDFE',tc:'#3C3489', url:function(q){return 'https://search.yahoo.com/search?p='+encodeURIComponent(q);}},
  {id:'ecosia',    name:'Ecosia',     c:'#3D7D24',bg:'#EAF3DE',tc:'#27500A', url:function(q){return 'https://www.ecosia.org/search?q='+encodeURIComponent(q);}},
  {id:'baidu',     name:'Baidu',      c:'#2932E1',bg:'#E6F1FB',tc:'#0C447C', url:function(q){return 'https://www.baidu.com/s?wd='+encodeURIComponent(q);}},
  {id:'yandex',    name:'Yandex',     c:'#CC0000',bg:'#FCEBEB',tc:'#791F1F', url:function(q){return 'https://yandex.com/search/?text='+encodeURIComponent(q);}},
  {id:'perplexity',name:'Perplexity', c:'#20A0A0',bg:'#E1F5EE',tc:'#085041', url:function(q){return 'https://www.perplexity.ai/search?q='+encodeURIComponent(q);}},
];
var AI_SOURCES=[
  {name:'Claude',   c:'#CC785C',bg:'#FAECE7',tc:'#712B13',domain:'claude.ai',             url:function(q){return 'https://claude.ai/new?q='+encodeURIComponent(q);},          snip:'Abre diretamente no chat com a tua pesquisa j\u00e1 escrita.'},
  {name:'ChatGPT',  c:'#10A37F',bg:'#E1F5EE',tc:'#085041',domain:'chatgpt.com',           url:function(q){return 'https://chatgpt.com/?q='+encodeURIComponent(q);},            snip:'Abre com a tua pesquisa no chat, apresentando uma resposta detalhada.'},
  {name:'Gemini',   c:'#4285F4',bg:'#EEF3FF',tc:'#0C447C',domain:'gemini.google.com',     url:function(q){return 'https://gemini.google.com/app#'+encodeURIComponent(q);},     snip:'Abre com a tua pergunta inserida, pronto para gerar uma resposta.'},
  {name:'Copilot',  c:'#6264A7',bg:'#EEEDFE',tc:'#3C3489',domain:'copilot.microsoft.com', url:function(q){return 'https://copilot.microsoft.com/?q='+encodeURIComponent(q);},  snip:'Combina resultados do Bing com IA da Microsoft.'},
  {name:'Grok',     c:'#222222',bg:'#F5F5F0',tc:'#444444',domain:'grok.com',              url:function(q){return 'https://grok.com/?q='+encodeURIComponent(q);},               snip:'Pesquisa em tempo real na web e na plataforma X.'},
  {name:'Mistral',  c:'#FF6600',bg:'#FAEEDA',tc:'#633806',domain:'chat.mistral.ai',       url:function(q){return 'https://chat.mistral.ai/chat?q='+encodeURIComponent(q);},    snip:'Resposta precisa e equilibrada com foco na neutralidade.'},
];
var NEWS_CATS=['Tudo','Mundo','Tecnologia','Ci\u00eancia','Desporto','Economia','Sa\u00fade','Cultura','Portugal','Ambiente'];
var NEWS_CACHE_KEY='nuvex_news_v2';
var NEWS_CACHE_TTL=30*60*1000;
var GNEWS_FEEDS=[
  {cat:'Mundo',      url:'https://news.google.com/rss/headlines/section/topic/WORLD?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Tecnologia', url:'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Ci\u00eancia',    url:'https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Desporto',   url:'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Economia',   url:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Sa\u00fade',      url:'https://news.google.com/rss/headlines/section/topic/HEALTH?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Cultura',    url:'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Portugal',   url:'https://news.google.com/rss/search?q=Portugal&hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Ambiente',   url:'https://news.google.com/rss/search?q=ambiente+clima&hl=pt-PT&gl=PT&ceid=PT:pt'},
];
var CAT_COLORS={
  'Sa\u00fade':['#FCEBEB','#791F1F'],'Portugal':['#EEF3FF','#0C447C'],'Tecnologia':['#EEEDFE','#3C3489'],
  'Economia':['#EAF3DE','#27500A'],'Ambiente':['#E1F5EE','#085041'],'Ci\u00eancia':['#E6F1FB','#0C447C'],
  'Desporto':['#FAEEDA','#633806'],'Cultura':['#FBEAF0','#72243E'],'Mundo':['#F1EFE8','#444441'],
};
var selEngines=new Set(ENGINES.map(function(e){return e.id;}));
var activeCat='Tudo';
var NEWS=[];
var newsLoaded=false;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderChips(){
  var el=document.getElementById('chips');
  el.innerHTML='';
  ENGINES.forEach(function(e){
    var d=document.createElement('button');
    d.className='chip'+(selEngines.has(e.id)?' on':'');
    d.innerHTML='<span class="dot"></span>'+e.name;
    if(selEngines.has(e.id)){d.style.borderColor=e.c;d.style.color=e.c;d.style.background=e.bg;}
    d.onclick=function(){
      if(selEngines.has(e.id)){if(selEngines.size>1)selEngines.delete(e.id);}else selEngines.add(e.id);
      renderChips();
    };
    el.appendChild(d);
  });
}

function setQ(t){document.getElementById('qinput').value=t;doSearch();}

function doSearch(){
  var q=document.getElementById('qinput').value.trim();
  if(!q)return;
  pushURL(q);
  var area=document.getElementById('results');
  area.innerHTML='<div class="spin show"><span></span><span></span><span></span></div>';
  setTimeout(function(){
    var h='<div class="aisummary">'
      +'<div class="ailabel">pesquisa com IA</div>'
      +'<div class="aitext">O <strong>Nuvex</strong> consultou '+AI_SOURCES.length+' IAs e '+selEngines.size+' motores para <strong>'+esc(q)+'</strong>.</div>'
      +'<div class="aisrcs">'+AI_SOURCES.map(function(a){return '<span class="aisrc" style="border-color:'+a.c+';color:'+a.tc+'">'+a.name+'</span>';}).join('')+'</div>'
      +'</div>';
    h+='<div class="sh"><span class="sb" style="background:#EEF3FF;color:#0C447C;">abrir nas IAs</span></div>';
    AI_SOURCES.forEach(function(a){
      h+='<a class="rc" href="'+a.url(q)+'" target="_blank" rel="noopener">'
        +'<div class="rct"><span class="rcb" style="background:'+a.bg+';color:'+a.tc+'">'+a.name+'</span>'
        +'<span class="rcs">'+a.domain+'</span></div>'
        +'<div class="rch">Perguntar "'+esc(q)+'" ao '+a.name+' \u2192</div>'
        +'<div class="rcp">'+a.snip+'</div></a>';
    });
    h+='<div class="div"></div>';
    h+='<div class="sh"><span class="sb" style="background:#F5F5F0;color:#444;">motores de busca</span></div>';
    ENGINES.forEach(function(e){
      if(!selEngines.has(e.id))return;
      h+='<a class="rc" href="'+e.url(q)+'" target="_blank" rel="noopener">'
        +'<div class="rct"><span class="rcb" style="background:'+e.bg+';color:'+e.tc+'">'+e.name+'</span>'
        +'<span class="rcs">'+e.url(q).split('?')[0].replace('https://www.','').replace('https://','')+'</span></div>'
        +'<div class="rch">Pesquisar "'+esc(q)+'" no '+e.name+' \u2192</div>'
        +'<div class="rcp">Ver todos os resultados do '+e.name+' em tempo real.</div></a>';
    });
    area.innerHTML=h;
  },700);
}

function switchTab(t){
  document.getElementById('panelSearch').style.display=t==='search'?'flex':'none';
  document.getElementById('panelNews').style.display=t==='news'?'flex':'none';
  document.getElementById('tabSearch').className='tab'+(t==='search'?' on':'');
  document.getElementById('tabNews').className='tab'+(t==='news'?' on':'');
  if(t==='news')renderNews();
}

function renderNewsCats(){
  var el=document.getElementById('newsCats');
  el.innerHTML='';
  NEWS_CATS.forEach(function(c){
    var b=document.createElement('button');
    b.className='ncat'+(c===activeCat?' on':'');
    b.textContent=c;
    b.onclick=function(){activeCat=c;displayNews();};
    el.appendChild(b);
  });
}

function timeAgo(ts){
  var d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000);
  if(m<2)return 'agora';
  if(m<60)return 'h\u00e1 '+m+'min';
  if(h<24)return 'h\u00e1 '+h+'h';
  return 'h\u00e1 '+Math.floor(h/24)+'d';
}

function displayNews(){
  renderNewsCats();
  var grid=document.getElementById('newsGrid');
  if(!newsLoaded){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2.5rem;color:#888;font-size:14px;">'
      +'<div class="spin show" style="margin-bottom:1rem"><span></span><span></span><span></span></div>'
      +'A carregar not\u00edcias...</div>';
    return;
  }
  var items=activeCat==='Tudo'?NEWS:NEWS.filter(function(n){return n.cat===activeCat;});
  if(!items.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#888;font-size:14px;">Sem not\u00edcias.</div>';return;}
  grid.innerHTML=items.map(function(n){
    var col=CAT_COLORS[n.cat]||['#F5F5F0','#444'];
    return '<a class="nc" href="'+(n.url||'#')+'" target="_blank" rel="noopener">'
      +'<span class="ncc" style="background:'+col[0]+';color:'+col[1]+'">'+n.cat+'</span>'
      +'<div class="nct">'+esc(n.title)+'</div>'
      +'<div class="ncm"><span>'+esc(n.src)+'</span><span>'+timeAgo(n.ts)+'</span></div></a>';
  }).join('');
}

async function fetchRSSFeed(feed){
  try{
    var r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(feed.url));
    var d=await r.json();
    var xml=new DOMParser().parseFromString(d.contents,'text/xml');
    var ts=Date.now();
    return Array.from(xml.querySelectorAll('item')).slice(0,4).map(function(item){
      var t=item.querySelector('title');
      var s=item.querySelector('source');
      var l=item.querySelector('link')||item.querySelector('guid');
      return {
        title:t?(t.textContent||'').replace(/ - [^-]+$/,'').trim():'',
        cat:feed.cat,
        src:s?s.textContent.trim():'Google News',
        url:l?l.textContent.trim():'https://news.google.com',
        ts:ts
      };
    }).filter(function(n){return n.title.length>5;});
  }catch(e){return [];}
}

async function fetchLiveNews(force){
  if(!force){
    try{
      var raw=localStorage.getItem(NEWS_CACHE_KEY);
      if(raw){var c=JSON.parse(raw);if(Date.now()-c.fetchedAt<NEWS_CACHE_TTL){NEWS=c.items;newsLoaded=true;displayNews();return;}}
    }catch(e){}
  }
  newsLoaded=false;displayNews();
  try{
    var all=await Promise.all(GNEWS_FEEDS.map(fetchRSSFeed));
    NEWS=all.reduce(function(a,b){return a.concat(b);},[]).filter(function(n){return n.title;});
    if(!NEWS.length)throw new Error('empty');
    newsLoaded=true;
    try{localStorage.setItem(NEWS_CACHE_KEY,JSON.stringify({fetchedAt:Date.now(),items:NEWS}));}catch(e){}
    displayNews();
    setTimeout(function(){fetchLiveNews(true);},NEWS_CACHE_TTL);
  }catch(err){
    newsLoaded=true;
    NEWS=[{title:'N\u00e3o foi poss\u00edvel carregar not\u00edcias. Tenta novamente.',cat:'Mundo',src:'Nuvex',url:'https://news.google.com',ts:Date.now()}];
    displayNews();
  }
}

function renderNews(){renderNewsCats();displayNews();fetchLiveNews(false);}

function getQueryParam(){return new URL(window.location.href).searchParams.get('q')||null;}
function pushURL(q){var u=new URL(window.location.href);q?u.searchParams.set('q',q):u.searchParams.delete('q');history.pushState({q:q},'',u.toString());}
window.addEventListener('popstate',function(e){
  var q=e.state&&e.state.q?e.state.q:getQueryParam();
  if(q){document.getElementById('qinput').value=q;switchTab('search');doSearch();}
});

var _deferredPrompt=null;
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;}
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;}

window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();_deferredPrompt=e;
  document.getElementById('installBtn').classList.add('show');
});
window.addEventListener('appinstalled',function(){
  document.getElementById('installBtn').classList.remove('show');_deferredPrompt=null;closeModal();
});

function handleInstall(){
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(function(){_deferredPrompt=null;document.getElementById('installBtn').classList.remove('show');});
  } else {
    var ios=isIOS();
    document.getElementById('modalContent').innerHTML=ios
      ?'<div class="mstep">1. Toca em <span class="mtag">Partilhar &#x2191;</span> no Safari<br>2. Seleciona <strong>"Adicionar ao ecr&atilde; inicial"</strong><br>3. Toca em <strong>Adicionar</strong></div>'
      :'<div class="mstep"><strong>Chrome / Chromium / Edge:</strong><br>Clica no &iacute;cone <span class="mtag">&#x2193;</span> na barra de endere&ccedil;o (lado direito)<br>ou vai ao menu <span class="mtag">&#x22EE;</span> &rarr; <strong>"Instalar Nuvex..."</strong></div>'
       +'<div class="mstep"><strong>Android (Chrome):</strong><br>Menu <span class="mtag">&#x22EE;</span> &rarr; <strong>"Adicionar ao ecr&atilde; inicial"</strong></div>';
    document.getElementById('installModal').classList.add('show');
  }
}
function bgClick(e){if(e.target===document.getElementById('installModal'))closeModal();}
function closeModal(){document.getElementById('installModal').classList.remove('show');}

if(!isStandalone()){document.getElementById('installBtn').classList.add('show');}

if('serviceWorker' in navigator){
  var sw='const C="nuvex-v1";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));';
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
}

document.getElementById('qinput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
renderChips();
var iq=getQueryParam();
if(iq){document.getElementById('qinput').value=iq;switchTab('search');setTimeout(doSearch,100);}
</script>
