<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Nuvex"/>
<meta name="theme-color" content="#4A7CF6"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/icon-512.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
<link rel="manifest" href="/manifest.json"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nuvex — Motor de Busca</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F5F0;color:#1a1a1a;min-height:100vh}

  .nx-wrap{display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 4rem;min-height:100vh}
  .nx-logo{font-size:52px;font-weight:500;letter-spacing:-2px;color:#1a1a1a;line-height:1;margin-bottom:4px}
  .nx-logo span{color:#4A7CF6}
  .nx-sub{font-size:12px;color:#888;letter-spacing:.06em;margin-bottom:1.75rem}

  .nx-tabs{display:flex;gap:4px;background:#fff;border:1px solid #e5e5e0;border-radius:25px;padding:4px;margin-bottom:1.5rem}
  .nx-tab{padding:7px 20px;border-radius:20px;font-size:13px;color:#666;cursor:pointer;display:flex;align-items:center;gap:6px;border:none;background:transparent;font-family:inherit;transition:all .15s}
  .nx-tab.on{background:#4A7CF6;color:#fff}
  .nx-tab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  .nx-search{width:100%;max-width:640px;position:relative;margin-bottom:1.25rem}
  .nx-input{width:100%;height:52px;border-radius:26px;border:1.5px solid #ddd;background:#fff;padding:0 54px 0 22px;font-size:15px;color:#1a1a1a;outline:none;font-family:inherit;transition:border-color .15s}
  .nx-input:focus{border-color:#4A7CF6;box-shadow:0 0 0 3px rgba(74,124,246,.12)}
  .nx-input::placeholder{color:#bbb}
  .nx-go{position:absolute;right:7px;top:7px;width:38px;height:38px;border-radius:50%;background:#4A7CF6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .nx-go:hover{background:#3567e8}
  .nx-go svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

  .nx-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:640px;margin-bottom:1.75rem}
  .chip{height:29px;padding:0 12px;border-radius:15px;border:1px solid #e5e5e0;background:#fff;font-size:11px;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;user-select:none;font-family:inherit}
  .chip:hover{border-color:#bbb;color:#333}
  .chip.on{border-width:1.5px}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5}
  .chip.on .dot{opacity:1}

  .nx-main{width:100%;max-width:640px}

  .dots{display:none;gap:7px;justify-content:center;margin:2.5rem 0}
  .dots.show{display:flex}
  .dots span{width:9px;height:9px;border-radius:50%;background:#4A7CF6;animation:bop 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes bop{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

  .ai-summary{background:#fff;border:1.5px solid #4A7CF6;border-radius:14px;padding:16px 18px;margin-bottom:1.5rem}
  .ai-label{font-size:11px;font-weight:600;color:#185FA5;background:#EEF3FF;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:9px;letter-spacing:.03em}
  .ai-text{font-size:14px;color:#333;line-height:1.7}
  .ai-sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .ai-src{font-size:11px;background:#f5f5f0;border:1px solid #e5e5e0;border-radius:8px;padding:2px 9px;color:#555}

  .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:4px}
  .sec-badge{font-size:11px;font-weight:600;padding:3px 11px;border-radius:10px;letter-spacing:.03em}

  .rcard{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:12px 16px;margin-bottom:9px;cursor:pointer;text-decoration:none;display:block;transition:border-color .12s,background .12s}
  .rcard:hover{border-color:#ccc;background:#fafaf7}
  .rcard-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .rcard-src{font-size:11px;color:#999}
  .rcard-badge{font-size:10px;padding:2px 8px;border-radius:7px;font-weight:600}
  .rcard-title{font-size:14px;font-weight:500;color:#1558B0;margin-bottom:5px;line-height:1.35}
  .rcard-snip{font-size:12px;color:#666;line-height:1.6}

  .divider{height:1px;background:#ebebeb;margin:1.25rem 0}

  .news-cats{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.25rem;width:100%;max-width:640px}
  .ncat{padding:6px 14px;border-radius:14px;border:1px solid #e5e5e0;background:#fff;font-size:12px;color:#666;cursor:pointer;transition:all .12s;font-family:inherit}
  .ncat:hover{border-color:#bbb;color:#333}
  .ncat.on{border-color:#4A7CF6;color:#185FA5;background:#EEF3FF;border-width:1.5px}

  .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;width:100%;max-width:640px}
  .ncard{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:14px 15px;cursor:pointer;text-decoration:none;display:block;transition:border-color .12s}
  .ncard:hover{border-color:#ccc}
  .ncard-cat{font-size:10px;font-weight:600;padding:2px 9px;border-radius:7px;display:inline-block;margin-bottom:8px;letter-spacing:.03em}
  .ncard-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:6px;line-height:1.45}
  .ncard-meta{font-size:11px;color:#999;display:flex;gap:10px}

  .home-suggest{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:2rem}
  .sug{padding:7px 16px;border-radius:18px;background:#fff;border:1px solid #e5e5e0;font-size:13px;color:#666;cursor:pointer;transition:all .12s;font-family:inherit}
  .sug:hover{background:#f5f5f0;color:#333;border-color:#ccc}


  .nx-install-btn{display:none;align-items:center;gap:7px;height:36px;padding:0 18px;border-radius:18px;background:#4A7CF6;border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;margin-bottom:1.25rem}
  .nx-install-btn:hover{background:#3567e8}
  .nx-install-btn.visible{display:flex}
  .nx-install-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .nx-ios-banner{display:none;align-items:center;gap:10px;background:#fff;border:1px solid #e5e5e0;border-radius:14px;padding:12px 16px;max-width:340px;margin-bottom:1.25rem;font-size:13px;color:#444}
  .nx-ios-banner.visible{display:flex}
  .nx-ios-banner svg{width:20px;height:20px;flex-shrink:0;stroke:#4A7CF6;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .nx-ios-close{margin-left:auto;background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;line-height:1;padding:0 2px;font-family:inherit}
  @media(max-width:480px){
    .nx-logo{font-size:40px}
    .news-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="nx-wrap">
  <div class="nx-logo">Nu<span>ve</span>x</div>
  <div class="nx-sub">pesquisa · IA · notícias</div>

  
  <button class="nx-install-btn" id="installBtn" onclick="triggerInstall()">
    <svg viewBox="0 0 24 24"><path d="M12 2v13m0 0l-4-4m4 4l4-4M2 17v2a2 2 0 002 2h16a2 2 0 002-2v-2"/></svg>
    Instalar app
  </button>
  <div class="nx-ios-banner" id="iosBanner">
    <svg viewBox="0 0 24 24"><path d="M12 2v13m0 0l-4-4m4 4l4-4"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
    <span>Para instalar: toca em <strong>Partilhar</strong> e depois <strong>"Adicionar ao ecrã inicial"</strong></span>
    <button class="nx-ios-close" onclick="document.getElementById('iosBanner').classList.remove('visible')">×</button>
  </div>

  <div class="nx-tabs">
    <button class="nx-tab on" id="tabSearch" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      Pesquisa
    </button>
    <button class="nx-tab" id="tabNews" onclick="switchTab('news')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
      Notícias
    </button>
  </div>

  <!-- SEARCH PANEL -->
  <div id="panelSearch" style="width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="nx-search">
      <input class="nx-input" id="qinput" placeholder="Pesquisa com IA em todos os motores..." autocomplete="off"/>
      <button class="nx-go" onclick="doSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
    </div>
    <div class="nx-chips" id="chips"></div>
    <div class="nx-main" id="results">
      <div class="home-suggest">
        <button class="sug" onclick="setQ('inteligência artificial 2025')">inteligência artificial 2025</button>
        <button class="sug" onclick="setQ('melhores séries Netflix')">melhores séries Netflix</button>
        <button class="sug" onclick="setQ('receitas saudáveis rápidas')">receitas saudáveis rápidas</button>
        <button class="sug" onclick="setQ('aprender programação')">aprender programação</button>
        <button class="sug" onclick="setQ('viagens baratas Europa')">viagens baratas Europa</button>
        <button class="sug" onclick="setQ('notícias Portugal hoje')">notícias Portugal hoje</button>
      </div>
    </div>
  </div>

  <!-- NEWS PANEL -->
  <div id="panelNews" style="display:none;width:100%;display:none;flex-direction:column;align-items:center">
    <div class="news-cats" id="newsCats"></div>
    <div class="news-grid" id="newsGrid"></div>
  </div>
</div>

<script>
const ENGINES=[
  {id:'google',    name:'Google',     c:'#4285F4',bg:'#EEF3FF',tc:'#0C447C', url:q=>`https://www.google.com/search?q=${encodeURIComponent(q)}`},
  {id:'bing',      name:'Bing',       c:'#00809D',bg:'#E1F5EE',tc:'#085041', url:q=>`https://www.bing.com/search?q=${encodeURIComponent(q)}`},
  {id:'duckduckgo',name:'DuckDuckGo', c:'#DE5833',bg:'#FAECE7',tc:'#712B13', url:q=>`https://duckduckgo.com/?q=${encodeURIComponent(q)}`},
  {id:'yahoo',     name:'Yahoo',      c:'#6001D2',bg:'#EEEDFE',tc:'#3C3489', url:q=>`https://search.yahoo.com/search?p=${encodeURIComponent(q)}`},
  {id:'ecosia',    name:'Ecosia',     c:'#3D7D24',bg:'#EAF3DE',tc:'#27500A', url:q=>`https://www.ecosia.org/search?q=${encodeURIComponent(q)}`},
  {id:'baidu',     name:'Baidu',      c:'#2932E1',bg:'#E6F1FB',tc:'#0C447C', url:q=>`https://www.baidu.com/s?wd=${encodeURIComponent(q)}`},
  {id:'yandex',    name:'Yandex',     c:'#CC0000',bg:'#FCEBEB',tc:'#791F1F', url:q=>`https://yandex.com/search/?text=${encodeURIComponent(q)}`},
  {id:'perplexity',name:'Perplexity', c:'#20A0A0',bg:'#E1F5EE',tc:'#085041', url:q=>`https://www.perplexity.ai/search?q=${encodeURIComponent(q)}`},
];

const AI_SOURCES=[
  {name:'Claude',    c:'#CC785C',bg:'#FAECE7',tc:'#712B13', url:q=>`https://claude.ai/new?q=${encodeURIComponent(q)}`,         domain:'claude.ai',              snip:'O Claude abre diretamente no chat com a tua pesquisa já escrita, pronto para responder.'},
  {name:'ChatGPT',   c:'#10A37F',bg:'#E1F5EE',tc:'#085041', url:q=>`https://chatgpt.com/?q=${encodeURIComponent(q)}`,           domain:'chatgpt.com',            snip:'O ChatGPT abre com a tua pesquisa no chat, apresentando uma resposta detalhada e atualizada.'},
  {name:'Gemini',    c:'#4285F4',bg:'#EEF3FF',tc:'#0C447C', url:q=>`https://gemini.google.com/app#${encodeURIComponent(q)}`,   domain:'gemini.google.com',      snip:'O Gemini do Google abre com a tua pergunta já inserida, pronto para gerar uma resposta.'},
  {name:'Copilot',   c:'#6264A7',bg:'#EEEDFE',tc:'#3C3489', url:q=>`https://copilot.microsoft.com/?q=${encodeURIComponent(q)}`, domain:'copilot.microsoft.com',  snip:'O Copilot abre com a tua pesquisa, combinando resultados do Bing com IA da Microsoft.'},
  {name:'Grok',      c:'#1A1A1A',bg:'#F5F5F0',tc:'#444',    url:q=>`https://grok.com/?q=${encodeURIComponent(q)}`,              domain:'grok.com',               snip:'O Grok abre com a tua pergunta, pesquisando em tempo real na web e na plataforma X.'},
  {name:'Mistral',   c:'#FF6600',bg:'#FAEEDA',tc:'#633806', url:q=>`https://chat.mistral.ai/chat?q=${encodeURIComponent(q)}`,   domain:'chat.mistral.ai',        snip:'O Mistral abre o chat com a tua pesquisa, entregando uma resposta precisa e equilibrada.'},
];

const NEWS_CATS=['Tudo','Mundo','Tecnologia','Ciência','Desporto','Economia','Saúde','Cultura','Portugal','Ambiente'];
const NEWS_CACHE_KEY='nuvex_news_v2';
const NEWS_CACHE_TTL=30*60*1000;
let NEWS=[];
let newsLoaded=false;

const GNEWS_FEEDS=[
  {cat:'Mundo',     url:'https://news.google.com/rss/headlines/section/topic/WORLD?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Tecnologia',url:'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Ciência',   url:'https://news.google.com/rss/headlines/section/topic/SCIENCE?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Desporto',  url:'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Economia',  url:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Saúde',     url:'https://news.google.com/rss/headlines/section/topic/HEALTH?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Cultura',   url:'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Portugal',  url:'https://news.google.com/rss/search?q=Portugal&hl=pt-PT&gl=PT&ceid=PT:pt'},
  {cat:'Ambiente',  url:'https://news.google.com/rss/search?q=ambiente+clima&hl=pt-PT&gl=PT&ceid=PT:pt'},
];
const CORS_PROXY='https://api.allorigins.win/get?url=';

const CAT_COLORS={
  'Saúde':    ['#FCEBEB','#791F1F'],
  'Portugal': ['#EEF3FF','#0C447C'],
  'Tecnologia':['#EEEDFE','#3C3489'],
  'Economia': ['#EAF3DE','#27500A'],
  'Ambiente': ['#E1F5EE','#085041'],
  'Ciência':  ['#E6F1FB','#0C447C'],
  'Desporto': ['#FAEEDA','#633806'],
  'Cultura':  ['#FBEAF0','#72243E'],
  'Mundo':    ['#F1EFE8','#444441'],
};

let selEngines=new Set(ENGINES.map(e=>e.id));
let activeCat='Tudo';

/* ---- CHIPS ---- */
function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML='';
  ENGINES.forEach(e=>{
    const d=document.createElement('button');
    d.className='chip'+(selEngines.has(e.id)?' on':'');
    d.innerHTML=`<span class="dot"></span>${e.name}`;
    if(selEngines.has(e.id)){d.style.borderColor=e.c;d.style.color=e.c;d.style.background=e.bg;}
    d.onclick=()=>{
      if(selEngines.has(e.id)){if(selEngines.size>1)selEngines.delete(e.id);}
      else selEngines.add(e.id);
      renderChips();
    };
    el.appendChild(d);
  });
}

/* ---- SEARCH ---- */
function setQ(t){document.getElementById('qinput').value=t;doSearch();}

function doSearch(){
  const q=document.getElementById('qinput').value.trim();
  if(!q)return;
  const area=document.getElementById('results');
  area.innerHTML=`<div class="dots show"><span></span><span></span><span></span></div>`;
  setTimeout(()=>{
    let html='';
    html+=`<div class="ai-summary">
      <div class="ai-label">resposta unificada por IA</div>
      <div class="ai-text">O <strong>Nuvex</strong> consultou ${AI_SOURCES.length} IAs e ${selEngines.size} motores de busca para "<strong>${escHtml(q)}</strong>". Abaixo encontras os resultados de cada IA com a fonte e o link direto.</div>
      <div class="ai-sources">${AI_SOURCES.map(a=>`<span class="ai-src" style="border-color:${a.c};color:${a.tc}">${a.name}</span>`).join('')}</div>
    </div>`;

    html+=`<div class="sec-head"><span class="sec-badge" style="background:#EEF3FF;color:#0C447C;">abrir pesquisa nas IAs</span></div>`;
    AI_SOURCES.forEach(a=>{
      html+=`<a class="rcard" href="${a.url(q)}" target="_blank" rel="noopener noreferrer">
        <div class="rcard-top">
          <span class="rcard-badge" style="background:${a.bg};color:${a.tc}">${a.name}</span>
          <span class="rcard-src">${a.domain}</span>
        </div>
        <div class="rcard-title">Perguntar "${escHtml(q)}" ao ${a.name} →</div>
        <div class="rcard-snip">${a.snip}</div>
      </a>`;
    });

    html+=`<div class="divider"></div>`;
    html+=`<div class="sec-head"><span class="sec-badge" style="background:#F5F5F0;color:#444;">motores de busca</span></div>`;
    ENGINES.filter(e=>selEngines.has(e.id)).forEach(e=>{
      const domain=e.url(q).split('?')[0].replace('https://www.','').replace('https://','');
      html+=`<a class="rcard" href="${e.url(q)}" target="_blank" rel="noopener noreferrer">
        <div class="rcard-top">
          <span class="rcard-badge" style="background:${e.bg};color:${e.tc}">${e.name}</span>
          <span class="rcard-src">${domain}</span>
        </div>
        <div class="rcard-title">Pesquisar "${escHtml(q)}" no ${e.name} →</div>
        <div class="rcard-snip">Clica para ver todos os resultados do ${e.name} para esta pesquisa em tempo real.</div>
      </a>`;
    });
    area.innerHTML=html;
  },800);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---- TABS ---- */
function switchTab(t){
  document.getElementById('panelSearch').style.display=t==='search'?'flex':'none';
  document.getElementById('panelNews').style.display=t==='news'?'flex':'none';
  document.getElementById('tabSearch').className='nx-tab'+(t==='search'?' on':'');
  document.getElementById('tabNews').className='nx-tab'+(t==='news'?' on':'');
  if(t==='news')renderNews();
}

/* ---- NEWS ---- */
/* ---- NEWS LIVE ---- */
function renderNewsCats(){
  const el=document.getElementById('newsCats');
  el.innerHTML='';
  NEWS_CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='ncat'+(c===activeCat?' on':'');
    b.textContent=c;
    b.onclick=()=>{activeCat=c;displayNews();};
    el.appendChild(b);
  });
}

function timeAgo(ts){
  const diff=Date.now()-ts;
  const m=Math.floor(diff/60000);
  const h=Math.floor(diff/3600000);
  if(m<2)return 'agora mesmo';
  if(m<60)return 'há '+m+'min';
  if(h<24)return 'há '+h+'h';
  return 'há '+Math.floor(h/24)+'d';
}

function displayNews(){
  renderNewsCats();
  const grid=document.getElementById('newsGrid');
  if(!newsLoaded){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2.5rem;color:#888;font-size:14px;"><div style="display:flex;gap:7px;justify-content:center;margin-bottom:1rem"><span style="width:9px;height:9px;border-radius:50%;background:#4A7CF6;display:inline-block;animation:bop 1.2s infinite"></span><span style="width:9px;height:9px;border-radius:50%;background:#4A7CF6;display:inline-block;animation:bop 1.2s .2s infinite"></span><span style="width:9px;height:9px;border-radius:50%;background:#4A7CF6;display:inline-block;animation:bop 1.2s .4s infinite"></span></div>A carregar notícias em tempo real...</div>';
    return;
  }
  const items=activeCat==='Tudo'?NEWS:NEWS.filter(n=>n.cat===activeCat);
  if(!items.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#888;font-size:14px;">Sem notícias nesta categoria.</div>';return;}
  grid.innerHTML=items.map(n=>{
    const [bg,tc]=CAT_COLORS[n.cat]||['#F5F5F0','#444'];
    return '<a class="ncard" href="'+(n.url||'#')+'" target="_blank" rel="noopener noreferrer">'
      +'<span class="ncard-cat" style="background:'+bg+';color:'+tc+'">'+n.cat+'</span>'
      +'<div class="ncard-title">'+n.title+'</div>'
      +'<div class="ncard-meta"><span>'+n.src+'</span><span>'+timeAgo(n.ts)+'</span></div>'
      +'</a>';
  }).join('');
}

async function fetchRSSFeed(feed){
  try{
    const proxy=CORS_PROXY+encodeURIComponent(feed.url);
    const resp=await fetch(proxy);
    const data=await resp.json();
    const parser=new DOMParser();
    const xml=parser.parseFromString(data.contents,'text/xml');
    const items=[...xml.querySelectorAll('item')].slice(0,4);
    const ts=Date.now();
    return items.map(item=>{
      const rawSrc=item.querySelector('source')?.textContent||
                   item.querySelector('author')?.textContent||'Google News';
      const link=item.querySelector('link')?.textContent||
                 item.querySelector('guid')?.textContent||'https://news.google.com';
      return {
        title:(item.querySelector('title')?.textContent||'').replace(/ - [^-]+$/,'').trim(),
        cat:feed.cat,
        src:rawSrc.trim(),
        url:link.trim(),
        ts
      };
    }).filter(n=>n.title.length>5);
  }catch(e){
    console.warn('RSS error for '+feed.cat,e);
    return[];
  }
}

async function fetchLiveNews(force){
  if(!force){
    try{
      const raw=localStorage.getItem(NEWS_CACHE_KEY);
      if(raw){
        const c=JSON.parse(raw);
        if(Date.now()-c.fetchedAt<NEWS_CACHE_TTL){
          NEWS=c.items; newsLoaded=true; displayNews(); return;
        }
      }
    }catch(e){}
  }
  newsLoaded=false; displayNews();
  try{
    const results=await Promise.all(GNEWS_FEEDS.map(f=>fetchRSSFeed(f)));
    NEWS=results.flat().filter(n=>n.title);
    if(NEWS.length===0) throw new Error('empty');
    newsLoaded=true;
    try{localStorage.setItem(NEWS_CACHE_KEY,JSON.stringify({fetchedAt:Date.now(),items:NEWS}));}catch(e){}
    displayNews();
    setTimeout(()=>fetchLiveNews(true),NEWS_CACHE_TTL);
  }catch(err){
    console.error('News error:',err);
    newsLoaded=true;
    NEWS=[{title:'Não foi possível carregar notícias. Verifica a ligação e tenta novamente.',cat:'Mundo',src:'Nuvex',url:'https://news.google.com',ts:Date.now()}];
    displayNews();
  }
}

function renderNews(){
  renderNewsCats();
  displayNews();
  fetchLiveNews(false);
}

/* ---- URL / DEEP LINK ---- */
function getQueryParam(name){
  const u=new URL(window.location.href);
  return u.searchParams.get(name)||u.hash.replace('#','').replace(/^q=/,'').replace(/%20/g,' ')||null;
}

function pushURL(q){
  const url=new URL(window.location.href);
  if(q){url.searchParams.set('q',q);}
  else{url.searchParams.delete('q');}
  history.pushState({q},'',url.toString());
}

const _doSearch=doSearch;
doSearch=function(){
  const q=document.getElementById('qinput').value.trim();
  if(!q)return;
  pushURL(q);
  _doSearch();
};

window.addEventListener('popstate',e=>{
  const q=e.state&&e.state.q?e.state.q:getQueryParam('q');
  if(q){
    document.getElementById('qinput').value=q;
    switchTab('search');
    _doSearch();
  }else{
    document.getElementById('qinput').value='';
    document.getElementById('results').innerHTML='<div class="home-suggest"><button class="sug" onclick="setQ('inteligência artificial 2025')">inteligência artificial 2025</button><button class="sug" onclick="setQ('melhores séries Netflix')">melhores séries Netflix</button><button class="sug" onclick="setQ('receitas saudáveis rápidas')">receitas saudáveis rápidas</button><button class="sug" onclick="setQ('aprender programação')">aprender programação</button><button class="sug" onclick="setQ('viagens baratas Europa')">viagens baratas Europa</button><button class="sug" onclick="setQ('notícias Portugal hoje')">notícias Portugal hoje</button></div>';
  }
});



/* ---- SERVICE WORKER ---- */
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='nuvex-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(e.request.url.startsWith(location.origin)){
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
    }
    return res;
  }).catch(()=>caches.match('/')))
));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

/* ---- PWA INSTALL ---- */
let _deferredPrompt=null;

function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
}
function isInStandaloneMode(){
  return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _deferredPrompt=e;
  document.getElementById('installBtn').classList.add('visible');
});

window.addEventListener('appinstalled',()=>{
  document.getElementById('installBtn').classList.remove('visible');
  _deferredPrompt=null;
});

function triggerInstall(){
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(()=>{
      _deferredPrompt=null;
      document.getElementById('installBtn').classList.remove('visible');
    });
  } else if(isIOS()){
    document.getElementById('iosBanner').classList.add('visible');
  }
}

if(!isInStandaloneMode()){
  if(isIOS()&&!localStorage.getItem('nuvex_ios_dismissed')){
    setTimeout(()=>document.getElementById('iosBanner').classList.add('visible'),1200);
    document.getElementById('iosBanner').querySelector('.nx-ios-close').addEventListener('click',()=>{
      localStorage.setItem('nuvex_ios_dismissed','1');
    });
  }
}

document.getElementById('qinput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
renderChips();

const _initQ=getQueryParam('q');
if(_initQ){
  document.getElementById('qinput').value=_initQ;
  switchTab('search');
  setTimeout(()=>_doSearch(),100);
}
